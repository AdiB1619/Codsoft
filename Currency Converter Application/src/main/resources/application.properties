# ==========================================
# Currency Converter Application – Properties
# ==========================================

# ----- Server -----
server.port=8080

# ----- Application Info -----
spring.application.name=currency-converter
info.app.name=Currency Converter Application
info.app.version=0.0.1-SNAPSHOT

# ----- Actuator -----
# Expose health + info endpoints; Spring Boot 3.x hides them by default
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# MySQL DataSource Configuration
# ==========================================
# Override these values via environment variables in production:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD

spring.datasource.url=jdbc:mysql://localhost:3306/currency_converter_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- HikariCP Connection Pool (Spring Boot default pool) -----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================
# Spring Data JPA / Hibernate
# ==========================================

# Let Hibernate auto-detect the MySQL dialect (recommended over hardcoding)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# DDL strategy:
#   update  – creates missing tables/columns on startup; safe for development.
#   validate – only validates schema (recommended for production).
#   none    – do nothing (use Flyway/Liquibase in production instead).
spring.jpa.hibernate.ddl-auto=update

# Log generated SQL statements (set to false in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Defer datasource initialisation until after JPA setup (avoids ordering issues)
spring.jpa.defer-datasource-initialization=true

# ==========================================
# External Exchange Rate API (ExchangeRate-API v6)
# ==========================================
# Sign up for a free key at: https://www.exchangerate-api.com/
#
# NEVER commit a real API key to source control.
# Override via environment variable in production:
#   export EXCHANGERATE_API_KEY=your_real_key_here
#
# The Spring property placeholder ${EXCHANGERATE_API_KEY:YOUR_API_KEY_HERE}
# will use the env-var if set, otherwise fall back to the placeholder string.

exchangerate.api.url=https://v6.exchangerate-api.com/v6
exchangerate.api.key=${EXCHANGERATE_API_KEY:YOUR_API_KEY_HERE}

# ----- HTTP Client Timeouts -----
# Milliseconds to wait when establishing a TCP connection to the API host
exchangerate.api.timeout.connect=3000
# Milliseconds to wait for data from the API after the connection is open
exchangerate.api.timeout.read=5000
