# ==========================================
# Test DataSource Configuration (H2 in-memory)
# ==========================================
#
# This file is placed in src/test/resources/ and is loaded ONLY during tests.
# It overrides the MySQL DataSource with an H2 in-memory database so that
# repository/integration tests run without a live MySQL instance.

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Use H2 dialect in tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Always recreate schema for each test run (clean slate)
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL in test output for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable deferred init (not needed for H2)
spring.jpa.defer-datasource-initialization=false

# IMPORTANT: data.sql uses MySQL-specific INSERT IGNORE — disable SQL init in tests.
# Test data is set up programmatically inside each test class instead.
spring.sql.init.mode=never

# ==========================================
# External API stub values (for unit tests)
# ==========================================
# The RestTemplate is mocked in tests so these values are never called,
# but @Value injection still requires non-null properties to be present.
exchangerate.api.url=https://v6.exchangerate-api.com/v6
exchangerate.api.key=TEST_KEY
exchangerate.api.timeout.connect=3000
exchangerate.api.timeout.read=5000
