# =============================================================================
# Student Management System — Prod Profile Properties
# Activate with: --spring.profiles.active=prod
# All values must be injected via environment variables in production.
# NEVER hardcode credentials here.
# =============================================================================

# --- DataSource ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# --- CORS (restrict to deployed frontend origin) ---
app.cors.allowed-origins=${FRONTEND_ORIGIN}

# --- Logging ---
logging.level.root=WARN
logging.level.com.codsoft.sms=INFO
