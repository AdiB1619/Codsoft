# =============================================================================
# Student Management System — Spring Boot Application Properties
# Base profile (shared across all environments)
#
# Environment-specific datasource credentials are NEVER stored here.
# They are resolved from:
#   - Dev:  application-dev.properties (DB_USERNAME / DB_PASSWORD env vars)
#   - Prod: application-prod.properties (DB_URL / DB_USERNAME / DB_PASSWORD
#           injected by the hosting platform)
#
# Activate a profile:
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
# =============================================================================

# --- Application ---
spring.application.name=student-management-system-backend
server.port=8080

# Activate the dev profile by default for local development.
# Override this when deploying (e.g. -Dspring.profiles.active=prod).
spring.profiles.active=dev

# --- DataSource ---
# URL and credentials are profile-specific; only the driver class is fixed here.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HikariCP Connection Pool ---
spring.datasource.hikari.pool-name=SmsHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / Hibernate ---
# ddl-auto=validate: Hibernate checks that entities match the schema created by
# schema.sql — it will NOT create, alter, or drop any table.
# This is the correct setting once schema.sql is the single source of truth.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Dialect is intentionally omitted — Spring Boot 3 / Hibernate 6 auto-detects
# the correct MySQLDialect from the JDBC driver metadata.
spring.jpa.open-in-view=false

# --- Jackson (JSON) ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# --- Multipart File Upload ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# --- Application-level Constants (consumed by AppConstants) ---
app.cors.allowed-origins=http://localhost:5173
app.upload.dir=src/main/resources/static/uploads

# --- Logging ---
logging.level.root=WARN
logging.level.com.codsoft.sms=INFO
logging.level.org.hibernate.SQL=WARN
