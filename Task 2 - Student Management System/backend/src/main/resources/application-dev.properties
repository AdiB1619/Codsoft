# =============================================================================
# Student Management System — Dev Profile Properties
# Activated automatically via spring.profiles.active=dev in application.properties
#
# Credentials are resolved from environment variables so that real passwords
# are never stored in version control.
#
# Set these before running the app:
#   Windows PowerShell:
#     $env:DB_USERNAME = "root"
#     $env:DB_PASSWORD = "your_password_here"
#   Windows CMD:
#     set DB_USERNAME=root
#     set DB_PASSWORD=your_password_here
#   IntelliJ IDEA:
#     Run Configuration → Environment Variables → add DB_USERNAME and DB_PASSWORD
# =============================================================================

# --- DataSource ---
spring.datasource.url=jdbc:mysql://localhost:3306/sms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA / Hibernate ---
# validate: Hibernate reads the existing schema and confirms entities match it.
# schema.sql is the single source of truth — Hibernate must NOT alter tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# --- Logging (verbose in dev) ---
logging.level.com.codsoft.sms=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
