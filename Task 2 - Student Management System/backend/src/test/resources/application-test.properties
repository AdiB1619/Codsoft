# =============================================================================
# Student Management System — Test Profile Properties
# Used exclusively by @DataJpaTest and @SpringBootTest in the test suite.
#
# Connects to the same local MySQL instance as dev, but uses credentials
# injected via environment variables — never hardcoded.
#
# Set before running tests:
#   $env:DB_USERNAME = "root"
#   $env:DB_PASSWORD = "root"      (or your actual password)
# =============================================================================

spring.datasource.url=jdbc:mysql://localhost:3306/sms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ddl-auto=validate: the test suite must not alter the schema — tests run
# against the schema already loaded by schema.sql.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# Suppress verbose Hikari startup logs during tests
logging.level.com.zaxxer.hikari=WARN
logging.level.org.hibernate=WARN
logging.level.com.codsoft.sms=DEBUG
